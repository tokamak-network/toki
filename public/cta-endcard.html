<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* 그라디언트 배경 */
  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a0e1a 0%, #1a1145 35%, #1e1b4b 50%, #0f2a3d 75%, #0a1628 100%);
  }

  /* 글로우 오브 */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    top: 50%;
    left: 25%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .glow-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    top: 30%;
    left: 15%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .glow-3 {
    position: absolute;
    width: 400px;
    height: 400px;
    bottom: 10%;
    left: 35%;
    background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* 미세한 노이즈 텍스처 */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* 왼쪽 컨텐츠 */
  .content {
    position: absolute;
    left: 120px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 30px;
    padding: 8px 22px;
    font-size: 15px;
    font-weight: 700;
    color: #4ade80;
    letter-spacing: 2px;
    width: fit-content;
  }

  .badge-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
  }

  .title {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
  }

  .title .highlight {
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 1px;
  }

  /* 프로그레스 */
  .progress {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }

  .progress-bar {
    width: 200px;
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    width: 25%;
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    border-radius: 3px;
  }

  .progress-text {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 700;
  }

  /* 다음 퀘스트 안내 */
  .next-hint {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .next-hint-arrow {
    font-size: 22px;
    color: #38bdf8;
  }

  .next-hint-text {
    font-size: 17px;
    color: rgba(255, 255, 255, 0.55);
  }

  .next-hint-text strong {
    color: rgba(255, 255, 255, 0.85);
    font-weight: 700;
  }

  /* 토키 캐릭터 */
  .toki {
    position: absolute;
    bottom: 60px;
    left: 120px;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    z-index: 10;
  }

  .toki-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid rgba(56, 189, 248, 0.25);
    background: rgba(255, 255, 255, 0.05);
    padding: 3px;
    object-fit: cover;
  }

  .toki-msg {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 12px 18px;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.7);
  }

  /* 로고 */
  .logo {
    position: absolute;
    bottom: 40px;
    right: 80px;
    z-index: 10;
    opacity: 0.3;
  }

  .logo img {
    height: 24px;
  }

  /* 오른쪽: YouTube 최종 화면 영역 가이드 */
  .yt-area {
    position: absolute;
    right: 100px;
    top: 50%;
    transform: translateY(-50%);
    width: 480px;
    height: 300px;
    border: 2px dashed rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .yt-area-text {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.15);
    text-align: center;
    line-height: 1.6;
  }

  /* 하단 라인 */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #38bdf8, #818cf8, transparent);
    opacity: 0.3;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
  <div class="noise"></div>

  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      QUEST COMPLETE
    </div>
    <div class="title">
      MetaMask 설치<br><span class="highlight">완료!</span>
    </div>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="progress-text">1 / 4</div>
    </div>
    <div class="next-hint">
      <span class="next-hint-arrow">▶</span>
      <span class="next-hint-text">다음: <strong>비밀키 가져오기</strong></span>
    </div>
  </div>

  <div class="toki">
    <img src="toki-icon.png" class="toki-icon" alt="Toki">
    <div class="toki-msg">잘했어! 다음 단계도 같이 해보자 🎉</div>
  </div>

  <div class="yt-area">
    <div class="yt-area-text">YouTube 최종 화면<br>영상 카드 영역</div>
  </div>

  <div class="logo">
    <img src="toki-title-logo.png" alt="Toki">
  </div>

  <div class="bottom-line"></div>
</body>
</html>
